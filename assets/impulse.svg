<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="body2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#e8e5e0"/>
  <!-- Cooktop body -->
  <rect x="60" y="120" width="280" height="100" fill="url(#body2)" rx="8"/>
  <!-- Glass surface -->
  <rect x="68" y="112" width="264" height="96" fill="url(#glass)" rx="6"/>
  <!-- Left zone - double burner ring -->
  <circle cx="148" cy="158" r="40" fill="none" stroke="#555" stroke-width="3"/>
  <circle cx="148" cy="158" r="28" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="148" cy="158" r="14" fill="#3a3a3a"/>
  <!-- Right zone - double burner ring -->
  <circle cx="258" cy="158" r="40" fill="none" stroke="#555" stroke-width="3"/>
  <circle cx="258" cy="158" r="28" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="258" cy="158" r="14" fill="#3a3a3a"/>
  <!-- Controls on right edge -->
  <rect x="335" y="135" width="5" height="46" fill="#333" rx="2"/>
  <circle cx="337" cy="148" r="6" fill="#5a5a5a" stroke="#777" stroke-width="1"/>
  <circle cx="337" cy="168" r="6" fill="#5a5a5a" stroke="#777" stroke-width="1"/>
  <!-- Small LED -->
  <circle cx="337" cy="135" r="3" fill="#60a5fa"/>
  <!-- Brand marking on surface -->
  <text x="198" y="218" font-family="sans-serif" font-size="8" fill="#666" text-anchor="middle" letter-spacing="3">IMPULSE</text>
</svg>
