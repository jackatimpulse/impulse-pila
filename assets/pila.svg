<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#e8e5e0"/>
  <!-- Battery unit body -->
  <rect x="80" y="110" width="240" height="110" fill="url(#body)" rx="6"/>
  <!-- Top face (isometric suggestion) -->
  <rect x="80" y="100" width="240" height="18" fill="url(#top)" rx="3"/>
  <!-- Ports on front face -->
  <rect x="100" y="140" width="24" height="12" fill="#1a1a1a" rx="2"/>
  <rect x="134" y="140" width="24" height="12" fill="#1a1a1a" rx="2"/>
  <rect x="168" y="140" width="24" height="12" fill="#1a1a1a" rx="2"/>
  <!-- LED indicator -->
  <circle cx="290" cy="146" r="5" fill="#4ade80"/>
  <circle cx="290" cy="146" r="3" fill="#86efac"/>
  <!-- Cables on the right -->
  <path d="M320 155 Q355 155 360 130 Q365 105 380 100" stroke="#2a2a2a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M320 165 Q360 165 370 190 Q378 210 390 210" stroke="#2a2a2a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Label area -->
  <rect x="95" y="175" width="130" height="28" fill="#383838" rx="3"/>
  <rect x="100" y="180" width="60" height="4" fill="#555" rx="2"/>
  <rect x="100" y="188" width="80" height="4" fill="#555" rx="2"/>
  <!-- Ventilation slots -->
  <rect x="240" y="165" width="50" height="3" fill="#222" rx="1"/>
  <rect x="240" y="172" width="50" height="3" fill="#222" rx="1"/>
  <rect x="240" y="179" width="50" height="3" fill="#222" rx="1"/>
  <rect x="240" y="186" width="50" height="3" fill="#222" rx="1"/>
  <rect x="240" y="193" width="50" height="3" fill="#222" rx="1"/>
</svg>
